// ── OPAKUJÍCÍ SE UDÁLOSTI ──
// Vrátí true pokud se událost vyskytuje v daném měsíci/roce
function eventOccursInMonth(ev,year,month){
  // Standardní rozsah
  const start=new Date(ev.dateStart+'T12:00:00');
  const end=new Date(ev.dateEnd+'T12:00:00');
  const mStart=new Date(year,month,1);
  const mEnd=new Date(year,month+1,0);
  if(!ev.recur){
    return start<=mEnd&&end>=mStart;
  }
  if(ev.recur==='yearly'){
    // Stejný měsíc, libovolný rok
    return start.getMonth()===month;
  }
  if(ev.recur==='monthly'){
    // Stejný den v měsíci, libovolný měsíc (pokud není v budoucnosti před originálem)
    return true; // zobrazí se každý měsíc
  }
  return false;
}

// Vrátí virtual event pro daný rok/měsíc (pro opakující se)
function getVirtualEvent(ev,year,month){
  if(!ev.recur)return ev;
  const orig=new Date(ev.dateStart+'T12:00:00');
  const origEnd=new Date(ev.dateEnd+'T12:00:00');
  const duration=origEnd-orig; // ms
  let newStart;
  if(ev.recur==='yearly'){
    newStart=new Date(year,orig.getMonth(),orig.getDate());
  }else if(ev.recur==='monthly'){
    newStart=new Date(year,month,orig.getDate());
  }else{
    return ev;
  }
  const newEnd=new Date(newStart.getTime()+duration);
  return{...ev,dateStart:ymd(newStart),dateEnd:ymd(newEnd),_virtual:true};
}

// Pro daný den vrátí všechny eventi (včetně opakujících)
function eventsForDate(ds){
  const d=new Date(ds+'T12:00:00');
  const year=d.getFullYear(),month=d.getMonth();
  const result=[];
  _events.forEach(ev=>{
    if(!ev.recur){
      if(ev.dateStart<=ds&&ev.dateEnd>=ds)result.push(ev);
    }else{
      if(eventOccursInMonth(ev,year,month)){
        const vev=getVirtualEvent(ev,year,month);
        if(vev.dateStart<=ds&&vev.dateEnd>=ds)result.push({...ev,...vev});
      }
    }
  });
  return result;
}

// Pro měsíční grid – všechny události v daném měsíci
function eventsInMonth(year,month){
  const result=[];
  _events.forEach(ev=>{
    if(!ev.recur){
      const s=new Date(ev.dateStart+'T12:00:00');
      const e=new Date(ev.dateEnd+'T12:00:00');
      if(s<=new Date(year,month+1,0)&&e>=new Date(year,month,1))result.push(ev);
    }else{
      if(eventOccursInMonth(ev,year,month)){
        result.push(getVirtualEvent(ev,year,month));
      }
    }
  });
  return result;
}

function renderCommentsHtml(comments,type,parentId,cssClass){
  let html=`<div class="${cssClass}">`;
  if(comments.length===0){html+=`<div class="no-comments">Zatím žádné komentáře</div>`;}
  comments.forEach(c=>{
    const author=_u.find(u=>u.id===c.userId);
    const canDel=_cur&&(_cur.isAdmin||_cur.id===c.userId);
    html+=`<div class="comment-item">
      <div class="comment-av">${author?author.emoji:'?'}</div>
      <div class="comment-right">
        <div class="comment-header">
          <span class="comment-author">${author?author.name:'?'}</span>
          ${canDel?`<button class="comment-del" onclick="deleteComment('${c.id}','${type}','${parentId}',this)">✕</button>`:''}
        </div>
        <div class="comment-text">${c.text}</div>
      </div>
    </div>`;
  });
  html+=`<div class="comment-form">
    <input class="comment-input" id="ci-${type}-${parentId}" placeholder="Přidej komentář…" maxlength="300" onkeydown="if(event.key==='Enter')submitComment('${type}','${parentId}',this)">
    <button class="comment-send" onclick="submitComment('${type}','${parentId}',this)">Odeslat</button>
  </div></div>`;
  return html;
}

  // Najdi input v same sekci
  const inp=document.getElementById(`ci-${type}-${parentId}`);
  if(!inp)return;
  const text=inp.value.trim();
  if(!text||!_cur)return;
  try{
    await addDoc(collection(db,'comments'),{type,parentId,userId:_cur.id,text,createdAt:serverTimestamp()});

    const comments=await loadComments(type,parentId);

      sec.innerHTML=renderCommentsHtml(comments,type,parentId,sec.className.split(' ')[0]).replace(/^<div[^>]*>/,'').replace(/<\/div>$/,'');

};

function evBlockHtml(ev,commentsCss){
  const owner=_u.find(u=>u.id===ev.userId);

  const canEdit=_cur&&(_cur.isAdmin||_cur.id===ev.userId);
  let meta=owner?`${owner.emoji} ${owner.name}`:'';
  if(ev.arrivalTime)meta+=` · příjezd ${ev.arrivalTime}`;
  if(ev.departTime)meta+=` · odjezd ${ev.departTime}`;
  if(ev.guests)meta+=` · ${ev.guests}`;
  if(ev.dateStart!==ev.dateEnd)meta+=` · ${ev.dateStart} – ${ev.dateEnd}`;
  const recurLabel=ev.recur?`<span class="recur-badge">${RECUR_LABEL[ev.recur]||''}</span>`:'';

        <div class="day-evt-title">${ev.title}${recurLabel}</div>

    </div>
    <div class="${commentsCss}" data-comments-id="event-${ev.id}"></div>
  `;
}

window.setEvFilter=function(f,el){
  _evFilter=f;
  document.querySelectorAll('.ev-ftag').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');renderEvList();
};
async function renderEvList(){
  const el=document.getElementById('evList');
  const today=ymd(new Date());
  // Expand opakující se na +2 roky
  const expanded=[];
  const thisYear=new Date().getFullYear();
  _events.forEach(ev=>{
    if(!ev.recur){expanded.push(ev);}
    else{
      for(let y=thisYear-1;y<=thisYear+2;y++){
        for(let m=0;m<12;m++){
          if(eventOccursInMonth(ev,y,m)){
            const vev=getVirtualEvent(ev,y,m);
            if(!expanded.find(e=>e.id===ev.id&&e.dateStart===vev.dateStart)){
              expanded.push({...ev,...vev});
            }
          }
        }
      }
    }
  });
  let list=expanded.sort((a,b)=>a.dateStart.localeCompare(b.dateStart));
  if(_evFilter==='upcoming')list=list.filter(e=>e.dateEnd>=today);
  if(_evFilter==='past')list=list.filter(e=>e.dateEnd<today);
  if(!list.length){el.innerHTML=`<div class="ev-empty">Žádné události</div>`;return;}
  let html='';let lastMonth='';
  list.forEach(ev=>{
    const d=new Date(ev.dateStart+'T12:00:00');
    const monthKey=`${d.getFullYear()}-${d.getMonth()}`;
    if(monthKey!==lastMonth){lastMonth=monthKey;html+=`<div class="ev-month-label">${MCS[d.getMonth()]} ${d.getFullYear()}</div>`;}
    const owner=_u.find(u=>u.id===ev.userId);
    const color=owner?owner.color:'#888';
    const isPast=ev.dateEnd<today;
    const canEdit=_cur&&(_cur.isAdmin||_cur.id===ev.userId);
    let meta=owner?`${owner.emoji} ${owner.name}`:'';
    if(ev.arrivalTime)meta+=' · příjezd '+ev.arrivalTime;
    if(ev.departTime)meta+=' · odjezd '+ev.departTime;
    if(ev.guests)meta+=' · '+ev.guests;
    if(ev.dateStart!==ev.dateEnd)meta+=` · ${ev.dateStart} – ${ev.dateEnd}`;
    const recurLabel=ev.recur?`<span class="recur-badge">${RECUR_LABEL[ev.recur]||''}</span>`:'';
    html+=`<div class="ev-block${isPast?' past':''}">
      <div class="ev-main">
        <div class="ev-color-bar" style="background:${color}"></div>
        <div class="ev-date-col"><div class="ev-day">${d.getDate()}</div><div class="ev-mon">${MCS_SHORT[d.getMonth()]}</div></div>
        <div class="ev-body">
          <div class="ev-title">${ev.title}${recurLabel}</div>
          ${meta?`<div class="ev-meta">${meta}</div>`:''}
          ${ev.desc?`<div class="ev-meta" style="font-style:italic;margin-top:2px">${ev.desc}</div>`:''}
          <div class="ev-owner">${owner?owner.emoji:''} ${owner?owner.name:''}</div>
        </div>
      </div>
      <div class="ev-actions">
        ${canEdit&&!ev._virtual?`<button class="ev-act edit" onclick="openModal('${ev.id}')">✏️ Upravit</button>
        <button class="ev-act del" onclick="deleteEvDirect('${ev.id}','${ev.userId}')">🗑 Smazat</button>`:''}
      </div>
      <div class="ev-comments-section" data-comments-id="event-${ev.id}"><div class="no-comments">Načítám komentáře…</div></div>
    </div>`;
  });
  el.innerHTML=html;
  // Načti komentáře pro všechny události
  const ids=[...new Set(list.map(e=>e.id))];
  ids.forEach(id=>populateComments('event',id,'ev-comments-section'));
}

  if(open.length){html+=`<div class="task-section">K dokončení (${open.length})</div>`;open.forEach(t=>html+=taskBlockHtml(t));}
  if(done.length){html+=`<div class="task-section">Hotovo (${done.length})</div>`;done.forEach(t=>html+=taskBlockHtml(t));}

}

window.uploadImage=async function(e){
  const file=e.target.files[0];if(!file)return;
  if(file.size>5*1024*1024){alert('Obrázek je příliš velký (max 5 MB).');return;}
  const editor=document.getElementById('geEditor');editor.focus();
  const ph=document.createElement('div');ph.className='ge-uploading';ph.textContent='⏳ Nahrávám obrázek…';
  const sel=window.getSelection();
  if(sel&&sel.rangeCount){sel.getRangeAt(0).insertNode(ph);}else{editor.appendChild(ph);}
  try{
    const path=`guides/${Date.now()}_${file.name.replace(/[^a-z0-9.]/gi,'_')}`;
    const storageRef=ref(storage,path);
    await uploadBytes(storageRef,file);
    const url=await getDownloadURL(storageRef);
    ph.remove();document.execCommand('insertHTML',false,`<img src="${url}" alt="foto">`);
  }catch(err){ph.remove();alert('Chyba nahrávání: '+err.message);}
  e.target.value='';
};

window.calNav=function(dir){_calDate.setMonth(_calDate.getMonth()+dir);_calDate=new Date(_calDate);renderCal();};
window.calGoToday=function(){_calDate=new Date();_selDate=ymd(new Date());renderCal();};
async function renderCal(){
  const y=_calDate.getFullYear(),m=_calDate.getMonth();
  await loadHolidays(y);if(m===11)await loadHolidays(y+1);
  document.getElementById('calTitle').textContent=`${MCS[m]} ${y}`;
  document.getElementById('calDow').innerHTML=['Po','Út','St','Čt','Pá','So','Ne'].map((d,i)=>`<div class="cal-dow-cell${i>=5?' we':''}">${d}</div>`).join('');
  const firstDay=new Date(y,m,1);
  const startOffset=(firstDay.getDay()+6)%7;
  const gridStart=addDays(firstDay,-startOffset);
  const today=ymd(new Date());
  if(!_selDate)_selDate=today;
  // Předpočítej události v tomto měsíci
  const grid=document.getElementById('calGrid');grid.innerHTML='';
  for(let i=0;i<42;i++){
    const cell=document.createElement('div');
    const cd=addDays(gridStart,i);const ds=ymd(cd);
    const inMonth=cd.getMonth()===m;const isToday=ds===today;
    const dow=cd.getDay();const isWE=dow===0||dow===6;
    const hol=(_holidays[cd.getFullYear()]||{})[ds];
    const isSel=ds===_selDate;
    const evts=eventsForDate(ds);
    let cls='cal-cell';
    if(!inMonth)cls+=' other-month';if(isToday)cls+=' today';
    if(isWE)cls+=' we-cell';if(hol&&!isWE)cls+=' hol-cell';if(isSel)cls+=' sel';
    cell.className=cls;
    let html=`<div class="cal-dn">${cd.getDate()}</div>`;
    if(hol)html+=`<div class="cal-hol">${hol}</div>`;
    html+=`<div class="cal-strips">`;
    evts.slice(0,2).forEach((ev,evIdx)=>{
      const isStart=ev.dateStart===ds, isEnd=ev.dateEnd===ds;
      let sc='strip';
      if(isStart&&isEnd) sc+=' solo';
      else if(isStart) sc+=' start';
      else if(isEnd) sc+=' end';
      else sc+=' cont';
      const owner=_u.find(u=>u.id===ev.userId);
      const color=owner?owner.color:'#888';
      const recurSym=ev.recur?'🔁':'';
      const isRowStart=(i%7===0);
      const isMonthStart=ds.endsWith('-01');
      const showLabel=isStart||isRowStart||isMonthStart;
      const _em=owner?owner.emoji:'';const _nm=owner?owner.name:'';const _ti=ev.title?(' · '+ev.title):'';const labelText=showLabel?(_em+' '+_nm+_ti+recurSym):'';
      html+=`<div class="strip-wrap"><div class="${sc}" style="background:${color}"></div><span class="strip-text">${labelText}</span></div>`;
    });
    if(evts.length>2)html+=`<div class="strip-more">+${evts.length-2}</div>`;
    html+=`</div>`;cell.innerHTML=html;
    cell.addEventListener('click',()=>{_selDate=ds;grid.querySelectorAll('.cal-cell').forEach(c=>c.classList.remove('sel'));cell.classList.add('sel');renderDayPanel(ds);});
    grid.appendChild(cell);
  }
  renderDayPanel(_selDate);
}

async function renderDayPanel(ds){
  const panel=document.getElementById('dayPanel');
  const evts=eventsForDate(ds);
  const d=new Date(ds+'T12:00:00');
  const hol=(_holidays[d.getFullYear()]||{})[ds];
  const isToday=ds===ymd(new Date());
  let html=`<div class="day-panel-hdr"><span class="day-panel-date">${fmtDate(ds)}${isToday?' · Dnes':''}</span>${hol?`<span class="day-panel-hol">🎉 ${hol}</span>`:''}</div>`;
  if(hol&&evts.length===0)html+=`<div class="day-hol-item"><span style="font-size:.9rem">🎉</span><span class="day-hol-name">${hol}</span></div>`;
  if(!hol&&evts.length===0)html+=`<div class="day-panel-empty">Žádné události · klikni + pro přidání</div>`;
  evts.forEach(ev=>{
    html+=`<div class="day-evt-block">${evBlockHtml(ev,'comments-section')}</div>`;
  });
  panel.innerHTML=html;
  // Načti komentáře
  evts.forEach(ev=>populateComments('event',ev.id,'comments-section'));
}

  </div>
  <div class="profile-edit" id="pe-${u.id}">
    <div class="profile-edit-title">Upravit profil<button class="pe-close" onclick="toggleProfileEdit('${u.id}')">✕</button></div>
    <div class="fg"><label>Jméno</label><input type="text" id="pe-name-${u.id}" value="${u.name}" maxlength="20" autocomplete="off"></div>
    <div class="fg"><label>Avatar</label><div class="ebox" id="pe-ebox-${u.id}"></div></div>
    <div class="fg"><label>Barva</label><div class="crow" id="pe-crow-${u.id}"></div></div>
    <div class="pin-change-section">
      <span class="pin-change-label">Změna PINu</span>
      <div class="pin-step active" id="pe-pin-step0-${u.id}"><button class="btn btn-g" style="margin-top:0" onclick="startPinChange('${u.id}')">Změnit PIN</button></div>
      <div class="pin-step" id="pe-pin-step1-${u.id}"><label class="pin-change-label">Nový PIN</label><div class="pdots" id="pe-pd1-${u.id}"></div><div class="ppad" id="pe-pp1-${u.id}"></div></div>
      <div class="pin-step" id="pe-pin-step2-${u.id}"><label class="pin-change-label">Potvrď PIN</label><div class="pdots" id="pe-pd2-${u.id}"></div><div class="ppad" id="pe-pp2-${u.id}"></div></div>
    </div>
    <div id="pe-msg-${u.id}"></div>
    <button class="btn btn-p" style="margin-top:12px" onclick="saveProfile('${u.id}')">Uložit změny</button>
  </div>`;
}
window.toggleProfileEdit=function(uid){
  const panel=document.getElementById('pe-'+uid);
  const isOpen=panel.classList.contains('open');
  document.querySelectorAll('.profile-edit.open').forEach(p=>p.classList.remove('open'));
  if(!isOpen)panel.classList.add('open');
};
function buildProfileEbox(uid,cur){
  const eb=document.getElementById('pe-ebox-'+uid);if(!eb)return;
  eb.innerHTML='';
  EM.forEach(em=>{const s=document.createElement('span');s.className='eo'+(em===cur?' sel':'');s.textContent=em;s.onclick=()=>{eb.querySelectorAll('.eo').forEach(x=>x.classList.remove('sel'));s.classList.add('sel');};eb.appendChild(s);});
}
function buildProfileColors(uid,cur){
  const cr=document.getElementById('pe-crow-'+uid);if(!cr)return;
  cr.innerHTML='';
  CO.forEach(c=>{const d=document.createElement('div');d.className='csw'+(c===cur?' sel':'');d.style.background=c;d.onclick=()=>{cr.querySelectorAll('.csw').forEach(x=>x.classList.remove('sel'));d.classList.add('sel');};cr.appendChild(d);});
}
function buildProfilePinPad(uid){
  ['pe-pin-step0','pe-pin-step1','pe-pin-step2'].forEach((s,i)=>{const el=document.getElementById(s+'-'+uid);if(el){el.className='pin-step'+(i===0?' active':'');}});
}
window.startPinChange=function(uid){
  _peP1='';_peP2='';
  const s0=document.getElementById('pe-pin-step0-'+uid);
  const s1=document.getElementById('pe-pin-step1-'+uid);
  if(s0)s0.className='pin-step';if(s1)s1.className='pin-step active';
  D('pe-pd1-'+uid,'');
  P('pe-pp1-'+uid,(d)=>{
    if(_peP1.length>=4)return;_peP1+=d;D('pe-pd1-'+uid,_peP1);
    if(_peP1.length===4){
      s1.className='pin-step';
      const s2=document.getElementById('pe-pin-step2-'+uid);if(s2)s2.className='pin-step active';
      D('pe-pd2-'+uid,'');
      P('pe-pp2-'+uid,(d2)=>{
        if(_peP2.length>=4)return;_peP2+=d2;D('pe-pd2-'+uid,_peP2);
        if(_peP2.length===4){
          if(_peP1!==_peP2){document.getElementById('pe-pd2-'+uid).classList.add('shake');setTimeout(()=>document.getElementById('pe-pd2-'+uid).classList.remove('shake'),380);M('pe-msg-'+uid,'PINy se neshodují');_peP2='';D('pe-pd2-'+uid,_peP2);}
          else{M('pe-msg-'+uid,'PIN potvrzen ✓','o');}
        }
      },()=>{_peP2=_peP2.slice(0,-1);D('pe-pd2-'+uid,_peP2);});
    }
  },()=>{_peP1=_peP1.slice(0,-1);D('pe-pd1-'+uid,_peP1);});
};
window.saveProfile=async function(uid){
  const nameEl=document.getElementById('pe-name-'+uid);
  const name=nameEl?nameEl.value.trim():'';
  if(!name){M('pe-msg-'+uid,'Zadej jméno');return;}
  if(_u.some(u=>u.id!==uid&&u.name.toLowerCase()===name.toLowerCase())){M('pe-msg-'+uid,'Jméno je již obsazené');return;}
  const selEm=document.getElementById('pe-ebox-'+uid)?.querySelector('.eo.sel')?.textContent;
  const selCol=document.getElementById('pe-crow-'+uid)?.querySelector('.csw.sel')?.style.background;
  const updateData={name};
  if(selEm)updateData.emoji=selEm;
  if(selCol)updateData.color=selCol;
  if(_peP1&&_peP1===_peP2&&_peP1.length===4)updateData.pinHash=await h256(_peP1);
  V(true);
  try{
    await updateDoc(doc(db,'users',uid),updateData);
    await loadU();
    if(_cur&&_cur.id===uid){_cur={..._cur,...updateData};localStorage.setItem('borsovikUser',JSON.stringify({id:_cur.id}));document.getElementById('pem').textContent=_cur.emoji;document.getElementById('pnm').textContent=_cur.name;}
    renderS();
  }catch(e){M('pe-msg-'+uid,'Chyba: '+e.message);}V(false);
};

// ── PIN UI ──
function D(id,pin){const el=document.getElementById(id);if(!el)return;el.innerHTML='';for(let i=0;i<4;i++){const d=document.createElement('div');d.className='pd'+(i<pin.length?' on':'');el.appendChild(d);}}
function P(id,oK,oD){const el=document.getElementById(id);if(!el)return;el.innerHTML='';['1','2','3','4','5','6','7','8','9','','0','⌫'].forEach(k=>{const b=document.createElement('button');if(!k){b.className='pk gap';}else if(k==='⌫'){b.className='pk del';b.textContent=k;b.onclick=oD;}else{b.className='pk';b.textContent=k;b.onclick=()=>oK(k);}el.appendChild(b);});}

// ── INIT ──
async function init(){
  V(true);await loadU();await loadEvents();await loadTasks();await loadGuides();
  _selDate=ymd(new Date());
  const stored=localStorage.getItem('borsovikUser');
  if(stored){try{const{id}=JSON.parse(stored);const f=_u.find(x=>x.id===id);if(f){_cur=f;eApp();return;}}catch(e){}}
  goTo('sHome');
}
init();
</script>
