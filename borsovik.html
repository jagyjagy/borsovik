<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boršovík</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23f0ece4'/%3E%3Cpolygon points='12,30 32,12 52,30' fill='%23b5623a'/%3E%3Crect x='18' y='30' width='28' height='22' fill='%23e8e0d0'/%3E%3Crect x='23' y='35' width='7' height='7' fill='%23a07050'/%3E%3Crect x='34' y='35' width='7' height='7' fill='%23a07050'/%3E%3Crect x='28' y='42' width='8' height='10' fill='%23a07050'/%3E%3Crect x='28' y='16' width='8' height='6' rx='1' fill='%23d4c8b8'/%3E%3C/svg%3E">
  <meta name="theme-color" content="#f7f4ef">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#f7f4ef;--bg2:#ede9e2;--bg3:#e4dfd6;
      --sf:#ffffff;--tx:#1c1917;--tx2:#6b6560;--tx3:#a09890;
      --ac:#b5623a;--ac2:#c97a52;--acbg:#f5ede8;
      --bd:#ddd9d2;--bd2:#ccc7be;
      --r:14px;--rs:8px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{-webkit-tap-highlight-color:transparent;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100svh;display:flex;flex-direction:column;font-size:15px;}

    .screen{display:none;flex:1;flex-direction:column;align-items:center;animation:up .28s cubic-bezier(.16,1,.3,1);}
    .screen.active{display:flex;}
    @keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

    /* HEADER */
    .hdr{width:100%;background:var(--sf);border-bottom:1px solid var(--bd);padding:0 20px;height:56px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
    .hdr-logo{width:30px;height:30px;flex-shrink:0;}
    .hdr-title{font-size:1.05rem;font-weight:600;letter-spacing:-.2px;}
    .hdr-sub{font-size:.72rem;color:var(--tx3);margin-left:auto;}

    /* HOME */
    .home-body{flex:1;width:100%;max-width:500px;padding:36px 20px 24px;display:flex;flex-direction:column;align-items:center;}
    .home-label{font-size:.7rem;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--tx3);margin-bottom:24px;}
    .users-grid{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;width:100%;margin-bottom:24px;}
    .user-card{display:flex;flex-direction:column;align-items:center;gap:9px;padding:20px 16px 16px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);cursor:pointer;transition:box-shadow .18s,border-color .18s,transform .18s cubic-bezier(.16,1,.3,1);min-width:96px;position:relative;}
    .user-card::after{content:'';position:absolute;top:0;left:16px;right:16px;height:2px;background:var(--uc,var(--ac));border-radius:0 0 2px 2px;opacity:.8;}
    .user-card:hover{box-shadow:0 4px 18px rgba(0,0,0,.08);border-color:var(--bd2);transform:translateY(-2px);}
    .uc-em{font-size:2.2rem;line-height:1;}
    .uc-name{font-size:.8rem;font-weight:500;}
    .uc-admin{font-size:.6rem;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:var(--ac);}
    .add-btn{display:flex;align-items:center;gap:7px;padding:10px 20px;border:1.5px dashed var(--bd2);border-radius:40px;background:transparent;color:var(--tx3);font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:500;cursor:pointer;transition:border-color .15s,color .15s;}
    .add-btn:hover{border-color:var(--ac);color:var(--ac);}

    /* CARD/FORM */
    .wrap{flex:1;width:100%;max-width:420px;padding:24px 16px;display:flex;flex-direction:column;align-items:center;}
    .card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:28px 24px;width:100%;}
    .card-ttl{font-size:1.15rem;font-weight:600;letter-spacing:-.2px;margin-bottom:2px;}
    .card-sub{font-size:.75rem;color:var(--tx3);letter-spacing:.5px;margin-bottom:24px;}
    .back{background:none;border:none;font-family:'DM Sans',sans-serif;font-size:.75rem;font-weight:500;color:var(--tx3);cursor:pointer;display:flex;align-items:center;gap:5px;margin-bottom:20px;padding:0;transition:color .13s;}
    .back:hover{color:var(--ac);}
    .fg{margin-bottom:16px;}
    .fg label{display:block;font-size:.7rem;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;color:var(--tx3);margin-bottom:7px;}
    .fg input[type=text]{width:100%;padding:11px 13px;border:1px solid var(--bd);border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:.9rem;color:var(--tx);background:var(--bg);outline:none;transition:border-color .13s;}
    .fg input[type=text]:focus{border-color:var(--ac2);background:#fff;}

    /* EMOJI */
    .ebox{display:flex;flex-wrap:wrap;gap:2px;padding:8px;background:var(--bg);border:1px solid var(--bd);border-radius:var(--rs);max-height:152px;overflow-y:auto;}
    .ebox::-webkit-scrollbar{width:4px;}
    .ebox::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:4px;}
    .eo{font-size:1.35rem;padding:3px 4px;border-radius:6px;cursor:pointer;border:1.5px solid transparent;transition:all .1s;line-height:1;}
    .eo:hover{background:var(--bg2);}
    .eo.sel{background:var(--acbg);border-color:var(--ac2);}
    .ehint{margin-top:7px;font-size:.72rem;color:var(--tx3);}

    /* COLORS */
    .crow{display:flex;flex-wrap:wrap;gap:7px;}
    .csw{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;outline:2px solid transparent;outline-offset:2px;transition:all .13s;}
    .csw:hover{transform:scale(1.18);}
    .csw.sel{outline-color:var(--tx);transform:scale(1.18);}

    /* PIN */
    .pdots{display:flex;gap:12px;justify-content:center;margin-bottom:20px;}
    .pd{width:11px;height:11px;border-radius:50%;border:1.5px solid var(--bd2);background:transparent;transition:all .18s cubic-bezier(.34,1.56,.64,1);}
    .pd.on{background:var(--ac);border-color:var(--ac);transform:scale(1.15);}
    .ppad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:210px;margin:0 auto;}
    .pk{aspect-ratio:1;background:var(--bg);border:1px solid var(--bd);border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:1.2rem;font-weight:500;color:var(--tx);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;-webkit-tap-highlight-color:transparent;}
    .pk:hover{background:var(--acbg);border-color:var(--ac2);color:var(--ac);}
    .pk:active{transform:scale(.92);}
    .pk.gap{border:none;background:transparent;pointer-events:none;}
    .pk.del{font-size:.85rem;color:var(--tx3);}

    /* BUTTONS */
    .btn{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;padding:13px 20px;border:none;border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:500;cursor:pointer;transition:all .15s;}
    .btn-p{background:var(--tx);color:#fff;}
    .btn-p:hover{background:#2d2926;}
    .btn-p:disabled{background:var(--bg3);color:var(--tx3);cursor:not-allowed;}
    .btn-g{background:transparent;color:var(--tx2);border:1px solid var(--bd);}
    .btn-g:hover{border-color:var(--bd2);color:var(--tx);}

    /* MESSAGES */
    .msg{margin-top:12px;padding:9px 13px;border-radius:var(--rs);font-size:.78rem;text-align:center;}
    .me{background:#fdf0ed;color:#b5623a;}
    .mo{background:#f0f5eb;color:#4a7c2f;}
    @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
    .shake{animation:shake .35s ease;}

    /* LOGIN */
    .lrow{display:flex;align-items:center;gap:13px;margin-bottom:24px;}
    .lav{width:50px;height:50px;border-radius:12px;background:var(--bg2);border:2px solid var(--uc,var(--ac));display:flex;align-items:center;justify-content:center;font-size:1.8rem;flex-shrink:0;}
    .lname{font-size:1.1rem;font-weight:600;}
    .lhint{font-size:.72rem;color:var(--tx3);}

    /* LOADING */
    .veil{position:fixed;inset:0;background:rgba(247,244,239,.9);backdrop-filter:blur(4px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:9999;}
    .ring{width:36px;height:36px;border:2.5px solid var(--bg3);border-top-color:var(--ac);border-radius:50%;animation:spin .7s linear infinite;}
    .rlabel{font-size:.7rem;letter-spacing:1.8px;text-transform:uppercase;color:var(--tx3);}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* APP SHELL */
    .app-shell{display:none;flex-direction:column;flex:1;overflow:hidden;}
    .app-shell.active{display:flex;}
    .top-bar{background:var(--sf);border-bottom:1px solid var(--bd);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
    .tb-brand{display:flex;align-items:center;gap:10px;}
    .tb-logo{width:28px;height:28px;}
    .tb-name{font-size:1rem;font-weight:600;letter-spacing:-.2px;}
    .upill{display:flex;align-items:center;gap:7px;padding:5px 12px;background:var(--bg);border:1px solid var(--bd);border-radius:40px;font-size:.78rem;font-weight:500;color:var(--tx2);cursor:pointer;transition:border-color .13s;}
    .upill:hover{border-color:var(--bd2);color:var(--tx);}
    .tab-content{flex:1;overflow-y:auto;}
    .tab-pane{display:none;padding:0;}
    .tab-pane.active{display:block;animation:up .2s ease;}

    /* TAB BAR */
    .tab-bar{display:flex;background:var(--sf);border-top:1px solid var(--bd);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom,0);}
    .tb{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px 11px;background:none;border:none;color:var(--tx3);font-family:'DM Sans',sans-serif;font-size:.58rem;font-weight:500;letter-spacing:.8px;text-transform:uppercase;cursor:pointer;transition:color .13s;position:relative;}
    .tb svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;transition:transform .2s cubic-bezier(.16,1,.3,1);}
    .tb.active{color:var(--ac);}
    .tb.active svg{transform:scale(1.1);}
    .tb.active::before{content:'';position:absolute;top:0;left:25%;right:25%;height:2px;background:var(--ac);border-radius:0 0 2px 2px;}

    /* ═══════════════ KALENDÁŘ ═══════════════ */
    .cal-wrap{display:flex;flex-direction:column;height:100%;}

    /* Horní lišta kalendáře */
    .cal-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--sf);border-bottom:1px solid var(--bd);flex-shrink:0;gap:8px;}
    .cal-nav{display:flex;align-items:center;gap:6px;}
    .cal-nav-btn{background:none;border:1px solid var(--bd);border-radius:var(--rs);width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--tx2);transition:all .13s;flex-shrink:0;}
    .cal-nav-btn:hover{border-color:var(--bd2);color:var(--tx);}
    .cal-nav-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
    .cal-title{font-size:.95rem;font-weight:600;min-width:130px;text-align:center;letter-spacing:-.1px;}
    .cal-today-btn{background:none;border:1px solid var(--bd);border-radius:var(--rs);padding:5px 11px;font-family:'DM Sans',sans-serif;font-size:.72rem;font-weight:500;color:var(--tx2);cursor:pointer;transition:all .13s;white-space:nowrap;}
    .cal-today-btn:hover{border-color:var(--ac);color:var(--ac);}

    /* View switcher */
    .view-sw{display:flex;background:var(--bg2);border-radius:var(--rs);padding:3px;gap:2px;flex-shrink:0;}
    .vsw-btn{padding:5px 11px;border:none;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:.72rem;font-weight:500;cursor:pointer;background:transparent;color:var(--tx3);transition:all .15s;white-space:nowrap;}
    .vsw-btn.active{background:var(--sf);color:var(--tx);box-shadow:0 1px 4px rgba(0,0,0,.08);}

    /* ── MĚSÍČNÍ POHLED ── */
    .cal-month{flex:1;display:flex;flex-direction:column;overflow:hidden;}
    .cal-dow{display:grid;grid-template-columns:repeat(7,1fr);background:var(--sf);border-bottom:1px solid var(--bd);flex-shrink:0;}
    .cal-dow-cell{text-align:center;padding:8px 2px;font-size:.65rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--tx3);}
    .cal-dow-cell.sun,.cal-dow-cell.sat{color:var(--ac2);}
    .cal-grid{flex:1;display:grid;grid-template-columns:repeat(7,1fr);grid-auto-rows:1fr;overflow-y:auto;align-content:start;}
    .cal-cell{border-right:1px solid var(--bd);border-bottom:1px solid var(--bd);padding:4px 3px 3px;min-height:72px;position:relative;display:flex;flex-direction:column;cursor:pointer;transition:background .12s;}
    .cal-cell:hover{background:var(--bg2);}
    .cal-cell.other-month .cal-day-num{color:var(--tx3);opacity:.4;}
    .cal-cell.today .cal-day-num{background:var(--ac);color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;}
    .cal-cell.sunday .cal-day-num,.cal-cell.saturday .cal-day-num{color:var(--ac2);}
    .cal-cell.today.sunday .cal-day-num,.cal-cell.today.saturday .cal-day-num{color:#fff;}
    .cal-day-num{font-size:.78rem;font-weight:500;width:22px;height:22px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-bottom:2px;}
    .cal-holiday{font-size:.6rem;color:var(--ac);font-weight:500;line-height:1.2;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

    /* Proužky událostí */
    .cal-events{display:flex;flex-direction:column;gap:2px;flex:1;overflow:hidden;}
    .evt-strip{font-size:.62rem;font-weight:500;padding:1px 5px;border-radius:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#fff;line-height:1.5;cursor:pointer;}
    .evt-strip.continues-right{border-radius:3px 0 0 3px;margin-right:-3px;}
    .evt-strip.continues-left{border-radius:0 3px 3px 0;margin-left:-3px;padding-left:2px;}
    .evt-strip.continues-both{border-radius:0;margin:0 -3px;padding:1px 2px;}
    .evt-more{font-size:.6rem;color:var(--tx3);padding:1px 3px;cursor:pointer;}

    /* ── TÝDENNÍ POHLED ── */
    .cal-week{flex:1;overflow:auto;display:flex;flex-direction:column;}
    .week-header{display:grid;grid-template-columns:48px repeat(7,1fr);border-bottom:1px solid var(--bd);background:var(--sf);flex-shrink:0;position:sticky;top:0;z-index:2;}
    .week-hcell{text-align:center;padding:8px 2px;border-left:1px solid var(--bd);}
    .week-hcell:first-child{border-left:none;}
    .week-day-name{font-size:.65rem;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--tx3);}
    .week-day-num{font-size:.95rem;font-weight:600;width:28px;height:28px;display:flex;align-items:center;justify-content:center;margin:2px auto 0;border-radius:50%;}
    .week-hcell.today .week-day-num{background:var(--ac);color:#fff;}
    .week-hcell.sunday .week-day-name,.week-hcell.saturday .week-day-name{color:var(--ac2);}
    .week-body{display:grid;grid-template-columns:48px repeat(7,1fr);flex:1;}
    .week-time-col{display:flex;flex-direction:column;}
    .week-hour-label{height:52px;display:flex;align-items:flex-start;justify-content:flex-end;padding:2px 8px 0 0;font-size:.62rem;color:var(--tx3);flex-shrink:0;}
    .week-day-col{border-left:1px solid var(--bd);position:relative;min-height:624px;}
    .week-hour-line{height:52px;border-bottom:1px solid var(--bd);flex-shrink:0;}
    .week-now-line{position:absolute;left:0;right:0;height:2px;background:var(--ac);z-index:1;pointer-events:none;}
    .week-now-line::before{content:'';position:absolute;left:-4px;top:-4px;width:10px;height:10px;border-radius:50%;background:var(--ac);}
    .week-evt{position:absolute;left:2px;right:2px;border-radius:4px;padding:2px 5px;font-size:.68rem;font-weight:500;color:#fff;overflow:hidden;cursor:pointer;z-index:1;}

    /* ── DENNÍ POHLED ── */
    .cal-day{flex:1;overflow:auto;display:flex;flex-direction:column;}
    .day-header{background:var(--sf);border-bottom:1px solid var(--bd);padding:12px 16px;flex-shrink:0;text-align:center;}
    .day-header .day-ttl{font-size:1.1rem;font-weight:600;}
    .day-header .day-sub{font-size:.72rem;color:var(--tx3);margin-top:2px;}
    .day-body{display:grid;grid-template-columns:48px 1fr;flex:1;}
    .day-time-col{display:flex;flex-direction:column;}
    .day-hour-label{height:52px;display:flex;align-items:flex-start;justify-content:flex-end;padding:2px 8px 0 0;font-size:.62rem;color:var(--tx3);flex-shrink:0;}
    .day-col{position:relative;border-left:1px solid var(--bd);min-height:624px;}
    .day-hour-line{height:52px;border-bottom:1px solid var(--bd);}
    .day-now-line{position:absolute;left:0;right:0;height:2px;background:var(--ac);z-index:1;pointer-events:none;}
    .day-now-line::before{content:'';position:absolute;left:-4px;top:-4px;width:10px;height:10px;border-radius:50%;background:var(--ac);}
    .day-evt{position:absolute;left:4px;right:4px;border-radius:4px;padding:3px 7px;font-size:.75rem;font-weight:500;color:#fff;overflow:hidden;cursor:pointer;}

    /* ── PŘIDAT TLAČÍTKO ── */
    .cal-add-fab{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 70px);right:20px;width:48px;height:48px;border-radius:50%;background:var(--ac);border:none;color:#fff;font-size:1.4rem;cursor:pointer;box-shadow:0 4px 16px rgba(181,98,58,.35);display:flex;align-items:center;justify-content:center;transition:transform .15s,box-shadow .15s;z-index:10;}
    .cal-add-fab:hover{transform:scale(1.07);box-shadow:0 6px 20px rgba(181,98,58,.4);}
    .cal-add-fab svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;}

    /* SETTINGS */
    .s-sec{font-size:.68rem;font-weight:500;letter-spacing:1.8px;text-transform:uppercase;color:var(--tx3);margin-bottom:10px;margin-top:22px;}
    .s-sec:first-child{margin-top:0;}
    .s-card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rs);padding:12px 14px;display:flex;align-items:center;gap:12px;margin-bottom:8px;}
    .s-av{font-size:1.7rem;flex-shrink:0;}
    .s-name{font-weight:500;font-size:.9rem;}
    .s-role{font-size:.7rem;color:var(--tx3);letter-spacing:.5px;}
    .s-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}

    /* PLACEHOLDER */
    .ph{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:72px 20px;text-align:center;}
    .ph svg{width:36px;height:36px;stroke:var(--tx3);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;opacity:.5;}
    .ph-t{font-size:1rem;font-weight:500;color:var(--tx2);}
    .ph-s{font-size:.72rem;color:var(--tx3);letter-spacing:.5px;}

    @media(min-width:480px){.card{padding:34px 30px;}}
  </style>
</head>
<body>

<svg style="display:none" xmlns="http://www.w3.org/2000/svg">
  <symbol id="ic" viewBox="0 0 40 40">
    <polygon points="4,22 20,6 36,22" fill="#b5623a"/>
    <rect x="16" y="9" width="8" height="5" rx="1" fill="#d4c0ae"/>
    <rect x="8" y="22" width="24" height="16" fill="#e8e0d4"/>
    <rect x="11" y="26" width="7" height="6" rx="1" fill="#a07050"/>
    <rect x="22" y="26" width="7" height="6" rx="1" fill="#a07050"/>
    <rect x="17" y="31" width="6" height="7" rx="1" fill="#8a6040"/>
  </symbol>
</svg>

<div class="veil" id="veil"><div class="ring"></div><div class="rlabel">Načítám</div></div>

<!-- HOME -->
<div class="screen active" id="sHome">
  <div class="hdr">
    <svg class="hdr-logo" viewBox="0 0 40 40"><use href="#ic"/></svg>
    <span class="hdr-title">Boršovík</span>
    <span class="hdr-sub">Rodinná chata</span>
  </div>
  <div class="home-body">
    <div class="home-label">Kdo jsi?</div>
    <div class="users-grid" id="usersGrid"></div>
    <button class="add-btn" onclick="goTo('sRegister')">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="6.5" y1=".5" x2="6.5" y2="12.5"/><line x1=".5" y1="6.5" x2="12.5" y2="6.5"/></svg>
      Přidat uživatele
    </button>

window.submitReg=async function(){

// ── HOLIDAYS ──
async function loadHolidays(year){
  if(_holidays[year])return;
  try{
    const r=await fetch(`https://date.nager.at/api/v3/PublicHolidays/${year}/CZ`);
    const data=await r.json();
    _holidays[year]={};
    data.forEach(h=>{_holidays[year][h.date]=h.localName;});
  }catch(e){console.warn('Svátky nedostupné',e);}
}

    _events=snap.docs.map(d=>({id:d.id,...d.data()}));
  }catch(e){console.error(e);}
}

function getEventsForDate(dateStr){
  return _events.filter(e=>e.dateStart<=dateStr&&e.dateEnd>=dateStr);
}

  ['Po','Út','St','Čt','Pá','So','Ne'].forEach((d,i)=>{
    const cls=i>=5?'sun':'';
    html+=`<div class="cal-dow-cell ${cls}">${d}</div>`;
  });
  html+=`</div><div class="cal-grid">`;

  const totalCells=42;
  for(let i=0;i<totalCells;i++){
    const cellDate=addDays(gridStart,i);
    const cdStr=ymd(cellDate);
    const isCurrentMonth=cellDate.getMonth()===m;
    const isToday=cdStr===today;
    const dow=cellDate.getDay(); // 0=Ne,6=So
    const isSun=dow===0, isSat=dow===6;
    const holiday=(_holidays[cellDate.getFullYear()]||{})[cdStr];
    const cellEvents=getEventsForDate(cdStr);

    let cls='cal-cell';
    if(!isCurrentMonth)cls+=' other-month';
    if(isToday)cls+=' today';
    if(isSun)cls+=' sunday';
    if(isSat)cls+=' saturday';

    html+=`<div class="${cls}" data-date="${cdStr}">`;
    html+=`<div class="cal-day-num">${cellDate.getDate()}</div>`;
    if(holiday)html+=`<div class="cal-holiday">${holiday}</div>`;

    // Proužky událostí (max 3, pak +N)
    html+=`<div class="cal-events">`;
    const shown=cellEvents.slice(0,3);
    shown.forEach(ev=>{
      const isStart=ev.dateStart===cdStr;
      const isEnd=ev.dateEnd===cdStr;
      let stripCls='evt-strip';
      if(!isEnd&&!isStart)stripCls+=' continues-both';
      else if(!isEnd)stripCls+=' continues-right';
      else if(!isStart)stripCls+=' continues-left';
      const owner=_u.find(u=>u.id===ev.userId);
      const color=ev.color||(owner?owner.color:'#888');
      const label=isStart?`${owner?owner.emoji:''}${owner?owner.name:''}${ev.title?' · '+ev.title:''}`:'';
      html+=`<div class="${stripCls}" style="background:${color}" title="${ev.title||''}">${label}</div>`;
    });
    if(cellEvents.length>3)html+=`<div class="evt-more">+${cellEvents.length-3} další</div>`;
    html+=`</div></div>`;
  }
  html+=`</div></div>`;
  body.innerHTML=html;

  // Klik na buňku
  body.querySelectorAll('.cal-cell').forEach(cell=>{
    cell.addEventListener('click',()=>{
      _calDate=new Date(cell.dataset.date+'T12:00:00');
      setView('day',document.querySelectorAll('.vsw-btn')[2]);
    });
  });
}

function renderWeek(body){
  const d=new Date(_calDate);
  const dow=(d.getDay()+6)%7; // 0=Po
  const weekStart=addDays(d,-dow);
  const y0=weekStart.getFullYear(),m0=weekStart.getMonth(),d0=weekStart.getDate();
  const weekEnd=addDays(weekStart,6);
  document.getElementById('calTitle').textContent=
    `${d0}. ${m0+1}. – ${weekEnd.getDate()}. ${weekEnd.getMonth()+1}. ${weekEnd.getFullYear()}`;

  const today=ymd(new Date());
  const now=new Date();
  const nowMinutes=now.getHours()*60+now.getMinutes();

  let html=`<div class="cal-week"><div class="week-header"><div class="week-hcell"></div>`;
  for(let i=0;i<7;i++){
    const day=addDays(weekStart,i);
    const ds=ymd(day);
    const isToday=ds===today;
    const isSun=day.getDay()===0,isSat=day.getDay()===6;
    let cls='week-hcell';
    if(isToday)cls+=' today';
    if(isSun)cls+=' sunday';
    if(isSat)cls+=' saturday';
    html+=`<div class="${cls}"><div class="week-day-name">${['Po','Út','St','Čt','Pá','So','Ne'][i]}</div><div class="week-day-num">${day.getDate()}</div></div>`;
  }
  html+=`</div><div class="week-body"><div class="week-time-col">`;
  for(let h=0;h<24;h++){html+=`<div class="week-hour-label">${h}:00</div>`;}
  html+=`</div>`;
  for(let i=0;i<7;i++){
    const day=addDays(weekStart,i);
    const ds=ymd(day);
    const isToday=ds===today;
    html+=`<div class="week-day-col" id="wdc-${i}">`;
    for(let h=0;h<24;h++)html+=`<div class="week-hour-line"></div>`;
    if(isToday){const pct=(nowMinutes/1440*100).toFixed(2);html+=`<div class="week-now-line" style="top:${pct}%"></div>`;}
    const dayEvts=getEventsForDate(ds);
    dayEvts.forEach(ev=>{
      const owner=_u.find(u=>u.id===ev.userId);
      const color=ev.color||(owner?owner.color:'#888');
      const arrivalMin=ev.arrivalTime?timeToMin(ev.arrivalTime):0;
      const departMin=ev.departTime?timeToMin(ev.departTime):1439;
      const top=(arrivalMin/1440*100).toFixed(2);
      const height=Math.max(((departMin-arrivalMin)/1440*100),2).toFixed(2);
      html+=`<div class="week-evt" style="top:${top}%;height:${height}%;background:${color}">${owner?owner.emoji:''} ${ev.title||''}</div>`;
    });
    html+=`</div>`;
  }
  html+=`</div></div>`;
  body.innerHTML=html;
}

function renderDay(body){
  const ds=ymd(_calDate);
  const dow=_calDate.getDay();
  const dowName=['neděle','pondělí','úterý','středa','čtvrtek','pátek','sobota'][dow];
  const holiday=(_holidays[_calDate.getFullYear()]||{})[ds];
  document.getElementById('calTitle').textContent=
    `${_calDate.getDate()}. ${_calDate.getMonth()+1}. ${_calDate.getFullYear()}`;

  const today=ymd(new Date());
  const isToday=ds===today;
  const now=new Date();
  const nowMinutes=now.getHours()*60+now.getMinutes();

  let html=`<div class="cal-day">
    <div class="day-header">
      <div class="day-ttl">${_calDate.getDate()}. ${MONTHS_CS[_calDate.getMonth()]} ${_calDate.getFullYear()}</div>
      <div class="day-sub">${dowName}${holiday?' · '+holiday:''}</div>
    </div>
    <div class="day-body">
      <div class="day-time-col">`;
  for(let h=0;h<24;h++)html+=`<div class="day-hour-label">${h}:00</div>`;
  html+=`</div><div class="day-col">`;
  for(let h=0;h<24;h++)html+=`<div class="day-hour-line"></div>`;
  if(isToday){const pct=(nowMinutes/1440*100).toFixed(2);html+=`<div class="day-now-line" style="top:${pct}%"></div>`;}
  const dayEvts=getEventsForDate(ds);
  dayEvts.forEach(ev=>{
    const owner=_u.find(u=>u.id===ev.userId);
    const color=ev.color||(owner?owner.color:'#888');
    const arrivalMin=ev.arrivalTime?timeToMin(ev.arrivalTime):0;
    const departMin=ev.departTime?timeToMin(ev.departTime):1439;
    const top=(arrivalMin/1440*100).toFixed(2);
    const height=Math.max(((departMin-arrivalMin)/1440*100),2).toFixed(2);
    html+=`<div class="day-evt" style="top:${top}%;height:${height}%;background:${color}">${owner?owner.emoji+' ':''}<strong>${owner?owner.name:''}</strong>${ev.title?' · '+ev.title:''}</div>`;
  });
  html+=`</div></div></div>`;
  body.innerHTML=html;
}

function timeToMin(t){if(!t)return 0;const[h,m]=t.split(':').map(Number);return h*60+(m||0);}

// ── SETTINGS ──
function renderS(){
  const u=_cur;
  let h=`<div class="s-sec">Přihlášen jako</div><div class="s-card"><div class="s-av">${u.emoji}</div><div style="flex:1"><div class="s-name">${u.name}${u.isAdmin?' 👑':''}</div><div class="s-role">${u.isAdmin?'Administrátor':'Uživatel'}</div></div><div class="s-dot" style="background:${u.color}"></div></div>`;
  if(u.isAdmin){h+=`<div class="s-sec">Všichni uživatelé</div>`;_u.forEach(x=>{h+=`<div class="s-card"><div class="s-av">${x.emoji}</div><div style="flex:1"><div class="s-name">${x.name}${x.isAdmin?' 👑':''}</div><div class="s-role">${x.isAdmin?'Admin':'Uživatel'}</div></div><div class="s-dot" style="background:${x.color}"></div></div>`;});}
  h+=`<div style="margin-top:24px"><button class="btn btn-g" onclick="logout()">Odhlásit se</button></div>
      <p style="margin-top:16px;text-align:center;font-size:.72rem;color:var(--tx3)">Editace profilu · brzy</p>
      <p style="margin-top:6px;text-align:center;font-size:.68rem;color:var(--tx3);letter-spacing:1px">v 1.01</p>`;
  document.getElementById('si').innerHTML=h;
}

// ── PIN UI ──
function D(id,pin){const el=document.getElementById(id);el.innerHTML='';for(let i=0;i<4;i++){const d=document.createElement('div');d.className='pd'+(i<pin.length?' on':'');el.appendChild(d);}}
function P(id,oK,oD){const el=document.getElementById(id);el.innerHTML='';['1','2','3','4','5','6','7','8','9','','0','⌫'].forEach(k=>{const b=document.createElement('button');if(!k){b.className='pk gap';}else if(k==='⌫'){b.className='pk del';b.textContent=k;b.onclick=oD;}else{b.className='pk';b.textContent=k;b.onclick=()=>oK(k);}el.appendChild(b);});}

async function init(){
  V(true);
  await loadU();
  await loadEvents();
  const s=sessionStorage.getItem('bU');
  if(s){try{const u=JSON.parse(s);const f=_u.find(x=>x.id===u.id);if(f){_cur=f;eApp();return;}}catch(e){}}
  goTo('sHome');
}
init();
