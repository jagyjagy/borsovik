<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boršovík</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23f0ece4'/%3E%3Cpolygon points='12,30 32,12 52,30' fill='%23b5623a'/%3E%3Crect x='18' y='30' width='28' height='22' fill='%23e8e0d0'/%3E%3Crect x='23' y='35' width='7' height='7' fill='%23a07050'/%3E%3Crect x='34' y='35' width='7' height='7' fill='%23a07050'/%3E%3Crect x='28' y='42' width='8' height='10' fill='%23a07050'/%3E%3Crect x='28' y='16' width='8' height='6' rx='1' fill='%23d4c8b8'/%3E%3C/svg%3E">
  <meta name="theme-color" content="#f7f4ef">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#f7f4ef;--bg2:#ede9e2;--bg3:#e4dfd6;
      --sf:#ffffff;--tx:#1c1917;--tx2:#6b6560;--tx3:#a09890;
      --ac:#b5623a;--ac2:#c97a52;--acbg:#f5ede8;
      --bd:#ddd9d2;--bd2:#ccc7be;
      --r:14px;--rs:8px;
      --tab-h:58px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{-webkit-tap-highlight-color:transparent;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);height:100svh;display:flex;flex-direction:column;font-size:15px;overflow:hidden;}

    /* ── SCREENS ── */
    .screen{display:none;flex:1;flex-direction:column;min-height:0;animation:up .28s cubic-bezier(.16,1,.3,1);}
    .screen.active{display:flex;}
    /* Home & register & login scroll freely */
    .screen-scroll{overflow-y:auto;}
    @keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

    /* ── HEADER ── */
    .hdr{width:100%;background:var(--sf);border-bottom:1px solid var(--bd);padding:0 20px;height:52px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
    .hdr-logo{width:28px;height:28px;flex-shrink:0;}
    .hdr-title{font-size:1rem;font-weight:600;letter-spacing:-.2px;}
    .hdr-sub{font-size:.72rem;color:var(--tx3);margin-left:auto;}

    /* ── HOME ── */
    .home-body{flex:1;width:100%;max-width:500px;padding:32px 20px 24px;display:flex;flex-direction:column;align-items:center;margin:0 auto;}
    .home-label{font-size:.7rem;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--tx3);margin-bottom:22px;}
    .users-grid{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;width:100%;margin-bottom:22px;}
    .user-card{display:flex;flex-direction:column;align-items:center;gap:8px;padding:18px 14px 14px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);cursor:pointer;transition:box-shadow .18s,border-color .18s,transform .18s cubic-bezier(.16,1,.3,1);min-width:90px;position:relative;}
    .user-card::after{content:'';position:absolute;top:0;left:14px;right:14px;height:2px;background:var(--uc,var(--ac));border-radius:0 0 2px 2px;opacity:.8;}
    .user-card:hover{box-shadow:0 4px 18px rgba(0,0,0,.08);border-color:var(--bd2);transform:translateY(-2px);}
    .uc-em{font-size:2rem;line-height:1;}
    .uc-name{font-size:.78rem;font-weight:500;}
    .uc-admin{font-size:.58rem;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:var(--ac);}
    .add-btn{display:flex;align-items:center;gap:7px;padding:9px 18px;border:1.5px dashed var(--bd2);border-radius:40px;background:transparent;color:var(--tx3);font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:500;cursor:pointer;transition:border-color .15s,color .15s;}
    .add-btn:hover{border-color:var(--ac);color:var(--ac);}

    /* ── CARD/FORM ── */
    .wrap{flex:1;width:100%;max-width:420px;padding:20px 16px;display:flex;flex-direction:column;align-items:center;margin:0 auto;}
    .card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:24px 22px;width:100%;}
    .card-ttl{font-size:1.1rem;font-weight:600;letter-spacing:-.2px;margin-bottom:2px;}
    .card-sub{font-size:.73rem;color:var(--tx3);margin-bottom:22px;}
    .back{background:none;border:none;font-family:'DM Sans',sans-serif;font-size:.73rem;font-weight:500;color:var(--tx3);cursor:pointer;display:flex;align-items:center;gap:5px;margin-bottom:18px;padding:0;transition:color .13s;}
    .back:hover{color:var(--ac);}
    .fg{margin-bottom:15px;}
    .fg label{display:block;font-size:.68rem;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;color:var(--tx3);margin-bottom:6px;}
    .fg input[type=text]{width:100%;padding:10px 12px;border:1px solid var(--bd);border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:.9rem;color:var(--tx);background:var(--bg);outline:none;transition:border-color .13s;}
    .fg input[type=text]:focus{border-color:var(--ac2);background:#fff;}

    /* ── EMOJI ── */
    .ebox{display:flex;flex-wrap:wrap;gap:2px;padding:8px;background:var(--bg);border:1px solid var(--bd);border-radius:var(--rs);max-height:148px;overflow-y:auto;}
    .ebox::-webkit-scrollbar{width:4px;}
    .ebox::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:4px;}
    .eo{font-size:1.3rem;padding:3px 4px;border-radius:6px;cursor:pointer;border:1.5px solid transparent;transition:all .1s;line-height:1;}
    .eo:hover{background:var(--bg2);}
    .eo.sel{background:var(--acbg);border-color:var(--ac2);}
    .ehint{margin-top:6px;font-size:.7rem;color:var(--tx3);}

    /* ── COLORS ── */
    .crow{display:flex;flex-wrap:wrap;gap:7px;}
    .csw{width:25px;height:25px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;outline:2px solid transparent;outline-offset:2px;transition:all .13s;}
    .csw:hover{transform:scale(1.18);}
    .csw.sel{outline-color:var(--tx);transform:scale(1.18);}

    /* ── PIN ── */
    .pdots{display:flex;gap:12px;justify-content:center;margin-bottom:18px;}
    .pd{width:11px;height:11px;border-radius:50%;border:1.5px solid var(--bd2);background:transparent;transition:all .18s cubic-bezier(.34,1.56,.64,1);}
    .pd.on{background:var(--ac);border-color:var(--ac);transform:scale(1.15);}
    .ppad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:210px;margin:0 auto;}
    .pk{aspect-ratio:1;background:var(--bg);border:1px solid var(--bd);border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:1.2rem;font-weight:500;color:var(--tx);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;}
    .pk:hover{background:var(--acbg);border-color:var(--ac2);color:var(--ac);}
    .pk:active{transform:scale(.92);}
    .pk.gap{border:none;background:transparent;pointer-events:none;}
    .pk.del{font-size:.85rem;color:var(--tx3);}

    /* ── BUTTONS ── */
    .btn{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;padding:12px 20px;border:none;border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:500;cursor:pointer;transition:all .15s;}
    .btn-p{background:var(--tx);color:#fff;}
    .btn-p:hover{background:#2d2926;}
    .btn-p:disabled{background:var(--bg3);color:var(--tx3);cursor:not-allowed;}
    .btn-g{background:transparent;color:var(--tx2);border:1px solid var(--bd);}
    .btn-g:hover{border-color:var(--bd2);color:var(--tx);}

    /* ── MSG ── */
    .msg{margin-top:11px;padding:8px 12px;border-radius:var(--rs);font-size:.77rem;text-align:center;}
    .me{background:#fdf0ed;color:#b5623a;}
    .mo{background:#f0f5eb;color:#4a7c2f;}
    @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
    .shake{animation:shake .35s ease;}

    /* ── LOGIN ── */
    .lrow{display:flex;align-items:center;gap:13px;margin-bottom:22px;}
    .lav{width:48px;height:48px;border-radius:12px;background:var(--bg2);border:2px solid var(--uc,var(--ac));display:flex;align-items:center;justify-content:center;font-size:1.7rem;flex-shrink:0;}
    .lname{font-size:1.05rem;font-weight:600;}
    .lhint{font-size:.7rem;color:var(--tx3);}

    /* ── LOADING ── */
    .veil{position:fixed;inset:0;background:rgba(247,244,239,.9);backdrop-filter:blur(4px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:9999;}
    .ring{width:34px;height:34px;border:2.5px solid var(--bg3);border-top-color:var(--ac);border-radius:50%;animation:spin .7s linear infinite;}
    .rlabel{font-size:.68rem;letter-spacing:1.8px;text-transform:uppercase;color:var(--tx3);}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ══════════════════════════════
       APP SHELL – fixed layout
    ══════════════════════════════ */
    .app-shell{display:none;flex-direction:column;height:100svh;}
    .app-shell.active{display:flex;}

    .top-bar{background:var(--sf);border-bottom:1px solid var(--bd);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
    .tb-brand{display:flex;align-items:center;gap:10px;}
    .tb-logo{width:26px;height:26px;}
    .tb-name{font-size:.95rem;font-weight:600;letter-spacing:-.2px;}
    .upill{display:flex;align-items:center;gap:6px;padding:5px 11px;background:var(--bg);border:1px solid var(--bd);border-radius:40px;font-size:.76rem;font-weight:500;color:var(--tx2);cursor:pointer;transition:border-color .13s;}
    .upill:hover{border-color:var(--bd2);color:var(--tx);}

    /* Tab content – fills remaining space */
    .tab-content{flex:1;min-height:0;overflow:hidden;position:relative;}
    .tab-pane{position:absolute;inset:0;display:none;flex-direction:column;overflow:hidden;}
    .tab-pane.active{display:flex;}

    /* scrollable panes (events/tasks/guides/settings) */
    .pane-scroll{overflow-y:auto;flex:1;padding:20px;}

    /* ── TAB BAR ── */
    .tab-bar{display:flex;background:var(--sf);border-top:1px solid var(--bd);flex-shrink:0;height:var(--tab-h);padding-bottom:env(safe-area-inset-bottom,0);}
    .tbb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;color:var(--tx3);font-family:'DM Sans',sans-serif;font-size:.56rem;font-weight:500;letter-spacing:.7px;text-transform:uppercase;cursor:pointer;transition:color .13s;position:relative;padding:0;}
    .tbb svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;transition:transform .2s cubic-bezier(.16,1,.3,1);}
    .tbb.active{color:var(--ac);}
    .tbb.active svg{transform:scale(1.08);}
    .tbb.active::before{content:'';position:absolute;top:0;left:28%;right:28%;height:2px;background:var(--ac);border-radius:0 0 2px 2px;}

    /* ═══════════════════════════════
       KALENDÁŘ
    ═══════════════════════════════ */
    .cal-outer{display:flex;flex-direction:column;height:100%;}

    /* Horní lišta */
    .cal-bar{display:flex;align-items:center;padding:8px 12px;background:var(--sf);border-bottom:1px solid var(--bd);gap:8px;flex-shrink:0;}
    .cal-nav{display:flex;align-items:center;gap:4px;flex:1;}
    .cnav-btn{background:none;border:1px solid var(--bd);border-radius:var(--rs);width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--tx2);transition:all .13s;flex-shrink:0;}
    .cnav-btn:hover{border-color:var(--bd2);color:var(--tx);}
    .cnav-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
    .cal-title{font-size:.9rem;font-weight:600;letter-spacing:-.1px;white-space:nowrap;flex:1;text-align:center;}
    .cal-today-btn{background:none;border:1px solid var(--bd);border-radius:var(--rs);padding:4px 10px;font-family:'DM Sans',sans-serif;font-size:.7rem;font-weight:500;color:var(--tx2);cursor:pointer;transition:all .13s;white-space:nowrap;flex-shrink:0;}
    .cal-today-btn:hover{border-color:var(--ac);color:var(--ac);}

    /* Dny v týdnu */
    .cal-dow{display:grid;grid-template-columns:repeat(7,1fr);background:var(--sf);border-bottom:1px solid var(--bd);flex-shrink:0;}
    .cal-dow-cell{text-align:center;padding:5px 0;font-size:.6rem;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--tx3);}
    .cal-dow-cell.we{color:var(--ac2);}

    /* Mřížka – kompaktní výška */
    .cal-grid-wrap{flex:0 0 auto;}
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);}
    .cal-cell{border-right:1px solid var(--bd);border-bottom:1px solid var(--bd);padding:3px 2px 2px;min-height:58px;display:flex;flex-direction:column;cursor:pointer;transition:background .12s;overflow:hidden;position:relative;}
    .cal-cell:nth-child(7n){border-right:none;}
    .cal-cell:hover{background:var(--bg2);}
    .cal-cell.sel{background:var(--acbg);}
    .cal-cell.other-month .cal-dn{opacity:.3;}
    .cal-cell.today .cal-dn{background:var(--ac);color:#fff;border-radius:50%;}
    .cal-cell.we-cell .cal-dn{color:var(--ac2);}
    .cal-cell.today.we-cell .cal-dn{color:#fff;}
    .cal-dn{font-size:.72rem;font-weight:500;width:20px;height:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-bottom:1px;}
    .cal-hol{font-size:.55rem;color:var(--ac);font-weight:500;line-height:1.2;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 1px;}

    /* Proužky */
    .cal-strips{display:flex;flex-direction:column;gap:1px;overflow:hidden;flex:1;}
    .strip{height:11px;border-radius:2px;font-size:.58rem;font-weight:500;color:#fff;line-height:11px;padding:0 3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .strip.cl{border-radius:0 2px 2px 0;padding-left:1px;}
    .strip.cr{border-radius:2px 0 0 2px;padding-right:0;}
    .strip.cb{border-radius:0;padding:0 1px;}
    .strip-more{font-size:.55rem;color:var(--tx3);padding:0 2px;line-height:12px;}

    /* ── DENNÍ PANEL ── */
    .day-panel{flex:1;min-height:0;overflow-y:auto;border-top:2px solid var(--bd);background:var(--sf);}
    .day-panel-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 6px;border-bottom:1px solid var(--bd);flex-shrink:0;position:sticky;top:0;background:var(--sf);z-index:1;}
    .day-panel-date{font-size:.82rem;font-weight:600;}
    .day-panel-hol{font-size:.7rem;color:var(--ac);font-weight:500;}
    .day-panel-empty{padding:24px;text-align:center;font-size:.8rem;color:var(--tx3);}
    .day-evt-item{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-bottom:1px solid var(--bd);cursor:pointer;transition:background .12s;}
    .day-evt-item:hover{background:var(--bg);}
    .day-evt-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px;}
    .day-evt-body{flex:1;min-width:0;}
    .day-evt-title{font-size:.85rem;font-weight:500;}
    .day-evt-meta{font-size:.72rem;color:var(--tx3);margin-top:1px;}
    .day-hol-item{padding:10px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px;}
    .day-hol-icon{font-size:.9rem;}
    .day-hol-name{font-size:.82rem;color:var(--ac);font-weight:500;}

    /* FAB */
    .fab{position:absolute;bottom:14px;right:14px;width:44px;height:44px;border-radius:50%;background:var(--ac);border:none;color:#fff;cursor:pointer;box-shadow:0 3px 14px rgba(181,98,58,.35);display:flex;align-items:center;justify-content:center;transition:transform .15s,box-shadow .15s;z-index:5;}
    .fab:hover{transform:scale(1.07);box-shadow:0 5px 18px rgba(181,98,58,.4);}
    .fab svg{width:20px;height:20px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;}

    /* SETTINGS / PLACEHOLDERS */
    .s-sec{font-size:.65rem;font-weight:500;letter-spacing:1.8px;text-transform:uppercase;color:var(--tx3);margin-bottom:10px;margin-top:20px;}
    .s-sec:first-child{margin-top:0;}
    .s-card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rs);padding:11px 13px;display:flex;align-items:center;gap:12px;margin-bottom:8px;}
    .s-av{font-size:1.6rem;flex-shrink:0;}
    .s-name{font-weight:500;font-size:.88rem;}
    .s-role{font-size:.68rem;color:var(--tx3);}
    .s-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
    .ph{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:60px 20px;text-align:center;}
    .ph svg{width:32px;height:32px;stroke:var(--tx3);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;opacity:.45;}
    .ph-t{font-size:.95rem;font-weight:500;color:var(--tx2);}
    .ph-s{font-size:.7rem;color:var(--tx3);}
  </style>
</head>
<body>

<svg style="display:none">
  <symbol id="ic" viewBox="0 0 40 40">
    <polygon points="4,22 20,6 36,22" fill="#b5623a"/>
    <rect x="16" y="9" width="8" height="5" rx="1" fill="#d4c0ae"/>
    <rect x="8" y="22" width="24" height="16" fill="#e8e0d4"/>
    <rect x="11" y="26" width="7" height="6" rx="1" fill="#a07050"/>
    <rect x="22" y="26" width="7" height="6" rx="1" fill="#a07050"/>
    <rect x="17" y="31" width="6" height="7" rx="1" fill="#8a6040"/>
  </symbol>
</svg>

<div class="veil" id="veil"><div class="ring"></div><div class="rlabel">Načítám</div></div>

<!-- HOME -->
<div class="screen screen-scroll active" id="sHome">
  <div class="hdr"><svg class="hdr-logo" viewBox="0 0 40 40"><use href="#ic"/></svg><span class="hdr-title">Boršovík</span><span class="hdr-sub">Rodinná chata</span></div>
  <div class="home-body">
    <div class="home-label">Kdo jsi?</div>
    <div class="users-grid" id="usersGrid"></div>
    <button class="add-btn" onclick="goTo('sRegister')">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="6" y1="0" x2="6" y2="12"/><line x1="0" y1="6" x2="12" y2="6"/></svg>
      Přidat uživatele
    </button>
  </div>
</div>

<!-- REGISTRACE -->
<div class="screen screen-scroll" id="sRegister">
  <div class="hdr"><svg class="hdr-logo" viewBox="0 0 40 40"><use href="#ic"/></svg><span class="hdr-title">Boršovík</span><span class="hdr-sub">Nový uživatel</span></div>
  <div class="wrap"><div class="card">
    <button class="back" onclick="goTo('sHome')">← Zpět</button>
    <div class="card-ttl">Vytvoř si profil</div>
    <div class="card-sub" id="regSub">Boršovík · nový člen</div>
    <div class="fg"><label>Jméno</label><input type="text" id="regName" placeholder="Jak ti říkají?" maxlength="20" autocomplete="off"></div>
    <div class="fg"><label>Avatar</label><div class="ebox" id="ebox"></div><div class="ehint">Vybráno: <span id="eprev">—</span></div></div>
    <div class="fg"><label>Barva</label><div class="crow" id="crow"></div></div>
    <div class="fg"><label>PIN — 4 číslice</label><div class="pdots" id="pd1"></div><div class="ppad" id="pp1"></div></div>
    <div class="fg" id="pin2w" style="display:none"><label>Potvrď PIN</label><div class="pdots" id="pd2"></div><div class="ppad" id="pp2"></div></div>
    <div id="regMsg"></div>
    <button class="btn btn-p" id="regBtn" onclick="submitReg()" disabled style="margin-top:10px">Vytvořit profil</button>
  </div></div>
</div>

<!-- LOGIN -->
<div class="screen screen-scroll" id="sLogin">
  <div class="hdr"><svg class="hdr-logo" viewBox="0 0 40 40"><use href="#ic"/></svg><span class="hdr-title">Boršovík</span><span class="hdr-sub">Přihlášení</span></div>
  <div class="wrap"><div class="card">
    <button class="back" onclick="goTo('sHome')">← Zpět</button>
    <div class="lrow"><div class="lav" id="lav"></div><div><div class="lname" id="lname"></div><div class="lhint">Zadej PIN</div></div></div>
    <div class="pdots" id="ldots"></div>
    <div class="ppad" id="lpad"></div>
    <div id="loginMsg"></div>
  </div></div>
</div>

<!-- APP SHELL -->
<div class="app-shell" id="appShell">
  <div class="top-bar">
    <div class="tb-brand"><svg class="tb-logo" viewBox="0 0 40 40"><use href="#ic"/></svg><span class="tb-name">Boršovík</span></div>
    <div class="upill" id="upill" onclick="logout()">
      <span id="pem"></span><span id="pnm"></span>

const EM=['😀','😃','😄','😁','😆','😅','🤣','😂','🙂','🙃','😉','😊','😇','🥰','😍','🤩','😘','😗','😚','😙','🥲','😋','😛','😜','🤪','😝','🤑','🤗','🤭','🤫','🤔','🤐','🤨','😐','😑','😶','😏','😒','🙄','😬','🤥','😌','😔','😪','🤤','😴','😷','🤒','🤕','🤢','🤧','🥵','🥶','🥴','😵','🤯','🤠','🥳','🥸','😎','🤓','🧐','😕','😟','🙁','☹️','😮','😯','😲','😳','🥺','😦','😧','😨','😰','😥','😢','😭','😱','😖','😣','😞','😓','😩','😫','🥱','😤','😡','😠','🤬','😈','👿','💀','💩','🤡','👹','👺','👻','👽','👾','🤖','😺','😸','😹','😻','😼','😽','🙀','😿','😾','🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼','🐻‍❄️','🐨','🐯','🦁','🐮','🐷','🐸','🐵','🙈','🙉','🙊','🐔','🐧','🐦','🦆','🦅','🦉','🦇','🐺','🐗','🐴','🦄','🐝','🐛','🦋','🐌','🐞','🐜','🦟','🦗','🕷','🦂','🐢','🐍','🦎','🐙','🦑','🦐','🦞','🦀','🐡','🐠','🐟','🐬','🐳','🐋','🦈','🦭','🐊','🦓','🦍','🦧','🦣','🐘','🦛','🦏','🐪','🐫','🦒','🦘','🦬','🐄','🐎','🐖','🐏','🐑','🦙','🐐','🦌','🐕','🐩','🦮','🐈','🐈‍⬛','🐓','🦃','🦤','🦚','🦜','🦢','🦩','🕊','🐇','🦝','🦨','🦡','🦫','🦦','🦥','🐁','🐀','🐿','🦔','🌵','🎄','🌲','🌳','🌴','🌱','🌿','☘️','🍀','🍃','🍂','🍁','🍄','🌾','💐','🌷','🌹','🥀','🌺','🌸','🌼','🌻','🌞','🌝','🌛','🌜','🌚','🌕','🌙','🌟','💫','⭐','🌠','☀️','⛅','🌦','🌧','⛈','🌩','🌨','❄️','☃️','⛄','💨','💧','💦','🌊','🔥','🌈','⚡','🍎','🍊','🍋','🍌','🍉','🍇','🍓','🫐','🍒','🍑','🥭','🍍','🥥','🥝','🍅','🍆','🥑','🥦','🥬','🥒','🌶','🧄','🧅','🥔','🍠','🥐','🍞','🥖','🧀','🥚','🍳','🥞','🧇','🥓','🥩','🍗','🍖','🌭','🍔','🍟','🍕','🥙','🌮','🌯','🥗','🍝','🍜','🍲','🍛','🍣','🍱','🥟','🍤','🍙','🍚','🍘','🍥','🧁','🍰','🎂','🍭','🍬','🍫','🍿','🍩','🍪','☕','🍵','🫖','🍺','🍻','🥂','🍷','🥃','🍸','🍹','🍾','🏠','🏡','🏢','🏥','🏦','🏨','🏪','🏫','🏬','🏭','🏯','🏰','🗼','🗽','⛪','🌃','🌄','🌅','🌆','🌇','🌉','🚂','🚌','🚑','🚒','🚓','🚕','🚗','🚙','🛻','🚚','🚛','🚜','🏎','🏍','🛵','🚲','🛴','🛹','⛵','🚤','🛥','🚢','✈️','🚁','🚀','🛸','🎆','🎇','🎃','🎄','🎀','🎁','🏆','🥇','🥈','🥉','🏅','🎭','🎨','🎬','🎤','🎧','🎵','🎶','🎹','🥁','🎷','🎺','🎸','🎻','🎲','♟','🎯','🎳','🎮','🧩','⚽','🏀','🏈','⚾','🥎','🎾','🏐','🏉','🎱','🏓','🏸','🏒','🏑','⛳','🎣','🥊','🥋'];
const CO=['#c0392b','#e67e22','#d4ac0d','#27ae60','#16a085','#2980b9','#8e44ad','#e91e63','#00838f','#558b2f','#ff5722','#546e7a','#6d4c41','#2d5a27','#1565c0'];
const MCS=['Leden','Únor','Březen','Duben','Květen','Červen','Červenec','Srpen','Září','Říjen','Listopad','Prosinec'];
const DCS=['neděle','pondělí','úterý','středa','čtvrtek','pátek','sobota'];

let _u=[],_cur=null,_lt=null,_lp='',_rp1='',_rp2='',_p1d=false,_se=EM[0],_sc=CO[0];
let _calDate=new Date(),_holidays={},_events=[],_selDate=null;

// UTILS
async function h256(s){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');}
const V=v=>document.getElementById('veil').style.display=v?'flex':'none';
const M=(id,t,c='e')=>document.getElementById(id).innerHTML=`<div class="msg m${c}">${t}</div>`;
function ymd(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function fmtDate(ds){const d=new Date(ds+'T12:00:00');return`${d.getDate()}. ${d.getMonth()+1}. ${d.getFullYear()}, ${DCS[d.getDay()]}`;}

// NAV
window.goTo=function(id){
  if(id==='sRegister')initR();
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('appShell').classList.remove('active');
  document.getElementById(id).classList.add('active');
};
function showApp(){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('appShell').classList.add('active');
  renderS();renderCal();
}
window.switchTab=function(t,el){
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tbb').forEach(b=>b.classList.remove('active'));
  document.getElementById('pane-'+t).classList.add('active');
  el.classList.add('active');
};

// USERS
async function loadU(){
  V(true);
  try{const s=await getDocs(query(collection(db,'users'),orderBy('createdAt')));_u=s.docs.map(d=>({id:d.id,...d.data()}));renderG();}catch(e){console.error(e);}
  V(false);
}
function renderG(){
  const g=document.getElementById('usersGrid');g.innerHTML='';
  _u.forEach(u=>{
    const b=document.createElement('button');b.className='user-card';b.style.setProperty('--uc',u.color);
    b.innerHTML=`<span class="uc-em">${u.emoji}</span><span class="uc-name">${u.name}</span>${u.isAdmin?'<span class="uc-admin">Admin</span>':''}`;
    b.onclick=()=>openL(u);g.appendChild(b);
  });
}

// LOGIN
window.openL=function(u){
  _lt=u;_lp='';
  const a=document.getElementById('lav');a.textContent=u.emoji;a.style.setProperty('--uc',u.color);
  document.getElementById('lname').textContent=u.name;
  document.getElementById('loginMsg').innerHTML='';
  D('ldots',_lp);P('lpad',lK,lD);goTo('sLogin');
};
async function lK(d){
  if(_lp.length>=4)return;_lp+=d;D('ldots',_lp);
  if(_lp.length===4){
    V(true);const h=await h256(_lp);V(false);
    if(h===_lt.pinHash){_cur=_lt;sessionStorage.setItem('bU',JSON.stringify(_cur));eApp();}
    else{document.getElementById('ldots').classList.add('shake');setTimeout(()=>document.getElementById('ldots').classList.remove('shake'),380);M('loginMsg','Špatný PIN');_lp='';D('ldots',_lp);}
  }
}
function lD(){_lp=_lp.slice(0,-1);D('ldots',_lp);document.getElementById('loginMsg').innerHTML='';}
function eApp(){document.getElementById('pem').textContent=_cur.emoji;document.getElementById('pnm').textContent=_cur.name;showApp();}
window.logout=function(){sessionStorage.removeItem('bU');_cur=null;goTo('sHome');};

// REGISTER
function initR(){
  _rp1='';_rp2='';_p1d=false;_se=EM[0];_sc=CO[0];
  document.getElementById('regName').value='';
  document.getElementById('regMsg').innerHTML='';
  document.getElementById('pin2w').style.display='none';
  document.getElementById('regBtn').disabled=true;
  document.getElementById('regSub').textContent=_u.length===0?'První uživatel · budeš admin 👑':'Boršovík · nový člen';
  const eb=document.getElementById('ebox');eb.innerHTML='';
  EM.forEach((em,i)=>{const s=document.createElement('span');s.className='eo'+(i===0?' sel':'');s.textContent=em;s.onclick=()=>{eb.querySelectorAll('.eo').forEach(x=>x.classList.remove('sel'));s.classList.add('sel');_se=em;document.getElementById('eprev').textContent=em;};eb.appendChild(s);});
  document.getElementById('eprev').textContent=EM[0];
  const cr=document.getElementById('crow');cr.innerHTML='';
  CO.forEach((c,i)=>{const d=document.createElement('div');d.className='csw'+(i===0?' sel':'');d.style.background=c;d.onclick=()=>{cr.querySelectorAll('.csw').forEach(x=>x.classList.remove('sel'));d.classList.add('sel');_sc=c;};cr.appendChild(d);});
  D('pd1',_rp1);P('pp1',r1k,r1d);D('pd2',_rp2);P('pp2',r2k,r2d);
}
function r1k(d){if(_rp1.length>=4||_p1d)return;_rp1+=d;D('pd1',_rp1);if(_rp1.length===4){_p1d=true;document.getElementById('pin2w').style.display='block';M('regMsg','Zadej PIN ještě jednou','o');}}
function r1d(){if(_p1d)return;_rp1=_rp1.slice(0,-1);D('pd1',_rp1);}
function r2k(d){
  if(_rp2.length>=4)return;_rp2+=d;D('pd2',_rp2);
  if(_rp2.length===4){
    if(_rp1!==_rp2){document.getElementById('pd2').classList.add('shake');setTimeout(()=>document.getElementById('pd2').classList.remove('shake'),380);M('regMsg','PINy se neshodují');_rp2='';D('pd2',_rp2);}
    else{M('regMsg','PIN potvrzen ✓','o');document.getElementById('regBtn').disabled=false;}
  }
}
function r2d(){_rp2=_rp2.slice(0,-1);D('pd2',_rp2);document.getElementById('regBtn').disabled=true;}
window.submitReg=async function(){
  const n=document.getElementById('regName').value.trim();
  if(!n){M('regMsg','Zadej jméno');return;}
  if(_rp1.length!==4||_rp1!==_rp2){M('regMsg','Zkontroluj PIN');return;}
  if(_u.some(u=>u.name.toLowerCase()===n.toLowerCase())){M('regMsg','Jméno je již obsazené');return;}
  V(true);
  try{const ph=await h256(_rp1);await addDoc(collection(db,'users'),{name:n,emoji:_se,color:_sc,pinHash:ph,isAdmin:_u.length===0,createdAt:serverTimestamp()});await loadU();goTo('sHome');}
  catch(e){M('regMsg','Chyba: '+e.message);}
  V(false);
};

// HOLIDAYS
async function loadHolidays(year){
  if(_holidays[year])return;
  try{const r=await fetch(`https://date.nager.at/api/v3/PublicHolidays/${year}/CZ`);const data=await r.json();_holidays[year]={};data.forEach(h=>{_holidays[year][h.date]=h.localName;});}
  catch(e){_holidays[year]={};}
}

// EVENTS
async function loadEvents(){
  try{const snap=await getDocs(query(collection(db,'events'),orderBy('dateStart')));_events=snap.docs.map(d=>({id:d.id,...d.data()}));}
  catch(e){console.error(e);}
}
function eventsForDate(ds){return _events.filter(e=>e.dateStart<=ds&&e.dateEnd>=ds);}

// CALENDAR
window.calNav=function(dir){_calDate.setMonth(_calDate.getMonth()+dir);_calDate=new Date(_calDate);renderCal();};
window.calGoToday=function(){_calDate=new Date();_selDate=ymd(new Date());renderCal();};
window.addEventPrompt=function(){alert('Přidání události – implementujeme v dalším kroku!');};

async function renderCal(){
  const y=_calDate.getFullYear(),m=_calDate.getMonth();
  await loadHolidays(y);if(m===11)await loadHolidays(y+1);
  document.getElementById('calTitle').textContent=`${MCS[m]} ${y}`;

  // DOW header
  const dowEl=document.getElementById('calDow');
  dowEl.innerHTML=['Po','Út','St','Čt','Pá','So','Ne'].map((d,i)=>`<div class="cal-dow-cell${i>=5?' we':''}">${d}</div>`).join('');

  const firstDay=new Date(y,m,1);
  const startOffset=(firstDay.getDay()+6)%7;
  const gridStart=addDays(firstDay,-startOffset);
  const today=ymd(new Date());
  if(!_selDate)_selDate=today;

  const grid=document.getElementById('calGrid');
  grid.innerHTML='';

  // Kolík řádků: vždy 6
  for(let i=0;i<42;i++){
    const cell=document.createElement('div');
    const cd=addDays(gridStart,i);
    const ds=ymd(cd);
    const inMonth=cd.getMonth()===m;
    const isToday=ds===today;
    const dow=cd.getDay(); // 0=Ne,6=So
    const isWE=dow===0||dow===6;
    const isSel=ds===_selDate;
    const hol=(_holidays[cd.getFullYear()]||{})[ds];
    const evts=eventsForDate(ds);

    let cls='cal-cell';
    if(!inMonth)cls+=' other-month';
    if(isToday)cls+=' today';
    if(isWE)cls+=' we-cell';
    if(isSel)cls+=' sel';
    cell.className=cls;

    // Číslo dne
    let html=`<div class="cal-dn">${cd.getDate()}</div>`;
    if(hol)html+=`<div class="cal-hol">${hol}</div>`;

    // Proužky (max 2 + more)
    html+=`<div class="cal-strips">`;
    const show=evts.slice(0,2);
    show.forEach(ev=>{
      const isStart=ev.dateStart===ds, isEnd=ev.dateEnd===ds;
      let sc='strip';
      if(!isStart&&!isEnd)sc+=' cb';
      else if(!isEnd)sc+=' cr';
      else if(!isStart)sc+=' cl';
      const owner=_u.find(u=>u.id===ev.userId);
      const color=owner?owner.color:'#888';
      const label=isStart?`${owner?owner.emoji:''}${owner?owner.name:''}${ev.title?' · '+ev.title:''}`:' ';
      html+=`<div class="${sc}" style="background:${color}" title="${ev.title||''}">${label}</div>`;
    });
    if(evts.length>2)html+=`<div class="strip-more">+${evts.length-2}</div>`;
    html+=`</div>`;
    cell.innerHTML=html;

    cell.addEventListener('click',()=>{
      _selDate=ds;
      grid.querySelectorAll('.cal-cell').forEach(c=>c.classList.remove('sel'));
      cell.classList.add('sel');
      renderDayPanel(ds);
    });
    grid.appendChild(cell);
  }

  renderDayPanel(_selDate);
}

function renderDayPanel(ds){
  const panel=document.getElementById('dayPanel');
  const evts=eventsForDate(ds);
  const hol=ds?(_holidays[(new Date(ds+'T12:00:00')).getFullYear()]||{})[ds]:null;
  const isToday=ds===ymd(new Date());

  let html=`<div class="day-panel-hdr">
    <span class="day-panel-date">${ds?fmtDate(ds):'Vyber den'}${isToday?' · Dnes':''}</span>
    ${hol?`<span class="day-panel-hol">🎉 ${hol}</span>`:''}
  </div>`;

  if(hol&&evts.length===0){
    html+=`<div class="day-hol-item"><span class="day-hol-icon">🎉</span><span class="day-hol-name">${hol}</span></div>`;
  }
  if(evts.length===0&&!hol){
    html+=`<div class="day-panel-empty">Žádné události</div>`;
  }
  evts.forEach(ev=>{
    const owner=_u.find(u=>u.id===ev.userId);
    const color=owner?owner.color:'#888';
    let meta=owner?`${owner.emoji} ${owner.name}`:'';
    if(ev.arrivalTime)meta+=` · příjezd ${ev.arrivalTime}`;
    if(ev.departTime)meta+=` · odjezd ${ev.departTime}`;
    html+=`<div class="day-evt-item">
      <div class="day-evt-dot" style="background:${color}"></div>
      <div class="day-evt-body">
        <div class="day-evt-title">${ev.title||'(bez názvu)'}</div>
        <div class="day-evt-meta">${meta}</div>
      </div>
    </div>`;
  });

  panel.innerHTML=html;
}

// SETTINGS
function renderS(){
  const u=_cur;
  let h=`<div class="s-sec">Přihlášen jako</div><div class="s-card"><div class="s-av">${u.emoji}</div><div style="flex:1"><div class="s-name">${u.name}${u.isAdmin?' 👑':''}</div><div class="s-role">${u.isAdmin?'Administrátor':'Uživatel'}</div></div><div class="s-dot" style="background:${u.color}"></div></div>`;
  if(u.isAdmin){h+=`<div class="s-sec">Všichni uživatelé</div>`;_u.forEach(x=>{h+=`<div class="s-card"><div class="s-av">${x.emoji}</div><div style="flex:1"><div class="s-name">${x.name}${x.isAdmin?' 👑':''}</div><div class="s-role">${x.isAdmin?'Admin':'Uživatel'}</div></div><div class="s-dot" style="background:${x.color}"></div></div>`;});}
  h+=`<div style="margin-top:24px"><button class="btn btn-g" onclick="logout()">Odhlásit se</button></div>
      <p style="margin-top:14px;text-align:center;font-size:.7rem;color:var(--tx3)">Editace profilu · brzy</p>
      <p style="margin-top:5px;text-align:center;font-size:.66rem;color:var(--tx3);letter-spacing:1px">v 1.02</p>`;
  document.getElementById('si').innerHTML=h;
}

// PIN UI
function D(id,pin){const el=document.getElementById(id);el.innerHTML='';for(let i=0;i<4;i++){const d=document.createElement('div');d.className='pd'+(i<pin.length?' on':'');el.appendChild(d);}}
function P(id,oK,oD){const el=document.getElementById(id);el.innerHTML='';['1','2','3','4','5','6','7','8','9','','0','⌫'].forEach(k=>{const b=document.createElement('button');if(!k){b.className='pk gap';}else if(k==='⌫'){b.className='pk del';b.textContent=k;b.onclick=oD;}else{b.className='pk';b.textContent=k;b.onclick=()=>oK(k);}el.appendChild(b);});}

// INIT
async function init(){
  V(true);await loadU();await loadEvents();
  _selDate=ymd(new Date());
  const s=sessionStorage.getItem('bU');
  if(s){try{const u=JSON.parse(s);const f=_u.find(x=>x.id===u.id);if(f){_cur=f;eApp();return;}}catch(e){}}
  goTo('sHome');
}
init();
</script>
